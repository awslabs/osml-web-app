# This workflow performs linting, unit testing, build verification,
# and security scanning for the osml-web-app project.

name: CI

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '24'

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install git-secrets
        run: |
          git clone https://github.com/awslabs/git-secrets.git /tmp/git-secrets
          cd /tmp/git-secrets && sudo make install
      - name: Register AWS patterns
        run: git secrets --register-aws
      - name: Install pre-commit
        run: pip install pre-commit tox
      - name: Install npm dependencies
        run: npm ci
      - name: Install CDK npm dependencies
        working-directory: cdk
        run: npm ci
      - name: Install pre-commit hooks
        run: pre-commit install-hooks
      - name: Run pre-commit hooks
        run: pre-commit run --from-ref origin/main --to-ref HEAD
      - name: Show auto-fix diff on failure
        if: failure()
        run: git diff

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
