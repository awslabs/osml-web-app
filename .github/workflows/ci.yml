# This workflow performs linting, unit testing, build verification,
# and security scanning for the osml-web-app project.

name: CI

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

env:
  NODE_VERSION: '24'

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install git-secrets
        run: |
          git clone https://github.com/awslabs/git-secrets.git /tmp/git-secrets
          cd /tmp/git-secrets && sudo make install
      - name: Register AWS patterns
        run: git secrets --register-aws
      - name: Install pre-commit
        run: pip install pre-commit tox
      - name: Install npm dependencies
        run: npm ci
      - name: Install CDK npm dependencies
        working-directory: cdk
        run: npm ci
      - name: Install pre-commit hooks
        run: pre-commit install-hooks
      - name: Run pre-commit hooks
        run: pre-commit run --from-ref origin/main --to-ref HEAD
      - name: Show auto-fix diff on failure
        if: failure()
        run: git diff

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # The Cypress harness mints a NextAuth session cookie (cy.loginBypass) and
      # stubs all backend services, so no real service URLs or OIDC provider are
      # needed. These let NextAuth initialise without erroring; none is a real
      # secret. NEXTAUTH_SECRET is generated at runtime below (not hardcoded) so
      # no secret literal lives in source.
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_CLIENT_ID: osml-client
      OIDC_AUTHORITY: https://keycloak.example.com/realms/osml
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      # The session-cookie signing key only needs to be consistent within this
      # one job run (the dev server and the Cypress Node task both read it from
      # the job env). Generate a throwaway value rather than committing a literal.
      - name: Generate throwaway NEXTAUTH_SECRET for the test session
        run: echo "NEXTAUTH_SECRET=$(openssl rand -base64 32)" >> "$GITHUB_ENV"
      # Runs against `next dev` (not `next start`): the test-only window hooks
      # (__OSML_STORE__, __OSML_GLOBE_VIEWER__, __OSML_MAP_INSTANCE__) are gated
      # on NODE_ENV !== 'production', so a production build would strip them.
      - name: Cypress run
        uses: cypress-io/github-action@v7
        with:
          install-command: npm ci
          start: npm run dev
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 120
          browser: electron
      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cypress-videos
          path: cypress/videos
          retention-days: 7
          if-no-files-found: ignore
      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 7
          if-no-files-found: ignore
      # On failure, list which tests produced screenshots inline on the Summary
      # tab. The run's Artifacts panel already links the screenshot/video zips,
      # but not which specific tests failed — that per-test list is the value here.
      - name: Publish Cypress failure summary
        if: failure()
        run: |
          if [ -d cypress/screenshots ] && [ -n "$(ls -A cypress/screenshots 2>/dev/null)" ]; then
            {
              echo "## Cypress failure screenshots (point of failure)"
              echo ""
              # One bullet per screenshot; Cypress names them after the failing test.
              find cypress/screenshots -name '*.png' | sort | sed 's|cypress/screenshots/||; s|^|- |'
              echo ""
              echo "Download the screenshots and per-spec videos from the Artifacts section of this run."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  security-scan:
    runs-on: ubuntu-latest
    needs: quality-checks
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install root npm dependencies
        run: npm ci
      - name: Install CDK npm dependencies
        working-directory: cdk
        run: npm ci
      - name: Install ASH
        run: pip install "git+https://github.com/awslabs/automated-security-helper.git@v3.5.2"
      - name: Patch ASH quoting bug
        # Applies scripts/patch-ash-quoting-bug.py to the installed ASH.
        # See .kiro/specs/ash-quoting-bug/NOTES.md — remove this step once
        # the upstream fix lands.
        run: python3 scripts/patch-ash-quoting-bug.py
      - name: Run ASH Security Scan
        run: ash --mode local --config .ash/ash.yaml --no-fail-on-findings
      - name: List ASH output
        if: always()
        run: |
          echo "=== .ash directory tree ==="
          find .ash -maxdepth 4 -type f 2>/dev/null | sort || echo "(no .ash directory)"
          echo ""
          echo "=== SARIF file check ==="
          if [ -f .ash/ash_output/reports/ash.ghas.sarif ]; then
            echo "GHAS SARIF exists, size: $(stat -c%s .ash/ash_output/reports/ash.ghas.sarif) bytes"
          else
            echo "GHAS SARIF not found at expected path"
          fi
      - name: Upload SARIF to GitHub code scanning
        # Uses ash.ghas.sarif (generated by ASH's github-ghas reporter), not
        # ash.sarif. The GHAS variant maps ASH severities to proper
        # Critical/High/Medium/Low levels and omits suppressed findings, so
        # GitHub's Code scanning tab only surfaces actionable alerts.
        if: always() && hashFiles('.ash/ash_output/reports/ash.ghas.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: .ash/ash_output/reports/ash.ghas.sarif
          category: ash
      - name: Upload ASH Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ash-security-results
          path: .ash/ash_output/
          retention-days: 30
          if-no-files-found: warn
