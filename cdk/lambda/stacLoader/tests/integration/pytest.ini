[pytest]
testpaths = .
python_files = test_*.py
python_functions = test_*
asyncio_mode = auto
addopts = -v --tb=long
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    integration: mark test as an integration test
