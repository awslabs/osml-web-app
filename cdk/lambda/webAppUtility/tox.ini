# Tox configuration for Lambda testing
[tox]
envlist = py312-prod
requires =
    tox-conda
    setuptools
skip_missing_interpreters = False

[testenv]
skip_install = true
conda_env = {toxinidir}/conda/environment.yml
deps =
    pytest==8.4.1
    pytest-cov==6.2.1
    pytest-mock==3.12.0
    moto[all]==5.1.10
    hypothesis==6.92.0
    boto3-stubs[bedrock,bedrock-runtime,dynamodb,s3,service-quotas]>=1.34.0
setenv =
    # MOTO/BOTO mock credentials
    AWS_DEFAULT_REGION=us-west-2
    AWS_ACCESS_KEY_ID=testing
    AWS_SECRET_ACCESS_KEY=testing
    AWS_SECURITY_TOKEN=testing
    AWS_SESSION_TOKEN=testing
    # Lambda environment variables
    QUOTA_TRACKING_TABLE=test-quota-table
    ENABLE_QUOTA_TRACKING=true
    # Add current directory to Python path so tests can import modules
    PYTHONPATH={toxinidir}
commands =
    pytest --cov=. --cov-report=html --cov-report=term-missing --cov-fail-under=1 --cov-config=.coveragerc {posargs}

[testenv:lint]
skip_install = true
conda_env =
deps = pre-commit
setenv =
    SKIP=npm-install,jest,eslint,prettier,frontend-npm-install,frontend-jest,frontend-eslint,frontend-prettier,cdk-npm-install,cdk-jest,cdk-eslint,cdk-prettier
commands = pre-commit run --all-files
