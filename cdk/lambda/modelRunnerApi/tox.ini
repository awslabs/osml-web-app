# Tox configuration for Lambda testing
[tox]
envlist = py312-prod
requires =
    tox-conda
    setuptools
skip_missing_interpreters = False

[testenv]
skip_install = true
conda_env = {toxinidir}/conda/environment.yml
deps =
    pytest==8.4.1
    pytest-cov==6.2.1
    pytest-mock==3.12.0
    moto[all]==5.1.10
    boto3-stubs[dynamodb,s3,sqs]>=1.34.0
setenv =
    # MOTO/BOTO mock credentials
    AWS_DEFAULT_REGION=us-west-2
    AWS_ACCESS_KEY_ID=testing
    AWS_SECRET_ACCESS_KEY=testing
    AWS_SECURITY_TOKEN=testing
    AWS_SESSION_TOKEN=testing
    # Lambda environment variables
    DDB_TABLE=test-mr-jobs
    IMAGE_REQUEST_QUEUE_URL=https://sqs.us-west-2.amazonaws.com/123456789012/test-queue
    # Add current directory to Python path so tests can import modules
    PYTHONPATH={toxinidir}
commands =
    pytest --cov=. --cov-report=html --cov-report=term-missing --cov-fail-under=1 --cov-config=.coveragerc {posargs}
